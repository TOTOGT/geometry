<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Orthogenesis · Cell Blueprint</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #060e1c;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 16px 40px;
}
h1 {
  font-size: 13px;
  letter-spacing: .22em;
  color: #4fc3f7;
  text-transform: uppercase;
  margin-bottom: 4px;
}
p.sub {
  font-size: 11px;
  color: #2a5a8a;
  letter-spacing: .1em;
  margin-bottom: 20px;
}
svg {
  max-width: 800px;
  width: 100%;
  border: 1px solid #1a3a60;
  background: #060e1c;
}
</style>
</head>
<body>
<h1>Orthogenesis · Cell Blueprint</h1>
<p class="sub">Lean 4 · HexGrid · Cell · Colony · Growth</p>
<svg id="cvs" viewBox="-400 -340 1100 680" xmlns="http://www.w3.org/2000/svg"></svg>

<script>
const NS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("cvs");

// ── palette ──────────────────────────────────────────────────────────
const NAVY   = "#060e1c";
const GRID   = "#0d2240";
const BLUE   = "#4fc3f7";
const MID    = "#1e6090";
const DIM    = "#124060";
const GOLD   = "#c9a84c";
const CREAM  = "#a8d8ea";
const FAINT  = "#0a1830";

// ── helpers ───────────────────────────────────────────────────────────
const S = NS;
function e(tag, attrs, txt) {
  const el = document.createElementNS(S, tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  if (txt !== undefined) el.textContent = txt;
  return el;
}
function append(...els) { els.forEach(x => svg.appendChild(x)); }

// Hex (pointy-top, size px)
const SZ = 54, SQ3 = Math.sqrt(3);
function hxy(q, r) { return { x: SZ*(q + r*0.5), y: SZ*(SQ3/2)*r }; }
function hpts(cx, cy, r) {
  return Array.from({length:6}, (_,i) => {
    const a = Math.PI/180*(60*i - 30);
    return `${cx + r*Math.cos(a)},${cy + r*Math.sin(a)}`;
  }).join(" ");
}
function hex(cx, cy, r, fill, stroke, sw, op, extra={}) {
  return e("polygon", {points:hpts(cx,cy,r), fill, stroke, "stroke-width":sw, opacity:op, ...extra});
}
function ring(n) {
  if (!n) return [{q:0,r:0}];
  const D = [[1,0],[0,1],[-1,1],[-1,0],[0,-1],[1,-1]];
  const out = []; let q=n, r=-n;
  for (let d=0;d<6;d++) for (let i=0;i<n;i++) { out.push({q,r}); q+=D[d][0]; r+=D[d][1]; }
  return out;
}

// ── defs (grid pattern + arrowhead) ──────────────────────────────────
const defs = e("defs", {});

const pat = e("pattern", {id:"bg", width:"27", height:"27", patternUnits:"userSpaceOnUse"});
pat.appendChild(e("rect",{width:"27",height:"27",fill:NAVY}));
pat.appendChild(e("path",{d:"M 27 0 L 0 0 0 27",fill:"none",stroke:GRID,"stroke-width":"0.5"}));
defs.appendChild(pat);

function mkArr(id, col) {
  const m = e("marker",{id, markerWidth:"8",markerHeight:"8",refX:"6",refY:"3",orient:"auto"});
  m.appendChild(e("polygon",{points:"0 0, 8 3, 0 6",fill:col}));
  return m;
}
defs.appendChild(mkArr("aB", BLUE));
defs.appendChild(mkArr("aG", GOLD));
defs.appendChild(mkArr("aD", MID));
svg.appendChild(defs);

// ── background ────────────────────────────────────────────────────────
append(e("rect",{x:"-400",y:"-340",width:"1100",height:"680",fill:"url(#bg)"}));

// ── outer rings (faint context) ───────────────────────────────────────
for (const {q,r} of ring(3))
  append(hex(...Object.values(hxy(q,r)), SZ*0.93, DIM, GRID, "1", "1"));
for (const {q,r} of ring(2))
  append(hex(...Object.values(hxy(q,r)), SZ*0.93, "#0a2040", MID, "1.2", "1"));

// ── ring 1 ─────────────────────────────────────────────────────────────
for (const {q,r} of ring(1)) {
  const {x,y} = hxy(q,r);
  // dashed spoke from center
  append(e("line",{x1:"0",y1:"0",x2:x,y2:y,
    stroke:BLUE,"stroke-width":"1","stroke-dasharray":"5 4",opacity:"0.3"}));
}
for (const {q,r} of ring(1)) {
  const {x,y} = hxy(q,r);
  append(hex(x, y, SZ*0.93, "#082038", BLUE, "1.8", "1"));
  // coord label
  append(e("text",{x,y:y-6,"text-anchor":"middle","dominant-baseline":"middle",
    "font-family":"'Courier New',monospace","font-size":"13",fill:BLUE,opacity:"0.9"},
    `(${q},${r})`));
  // stage badge
  append(e("text",{x,y:y+12,"text-anchor":"middle","dominant-baseline":"middle",
    "font-family":"'Courier New',monospace","font-size":"11",fill:MID},"n=1"));
}

// ── seed cell (stage 0) ───────────────────────────────────────────────
// glow halos
append(e("circle",{cx:"0",cy:"0",r:SZ*1.1,fill:BLUE,opacity:"0.04"}));
append(e("circle",{cx:"0",cy:"0",r:SZ*0.75,fill:BLUE,opacity:"0.07"}));
// main hex
append(hex(0, 0, SZ*0.93, "#0d2a48", BLUE, "2.4", "1"));
// inner dashed outline
append(hex(0, 0, SZ*0.62, "none", BLUE, "1", "0.5",{"stroke-dasharray":"5 4"}));
// crosshair
[-1,1].forEach(s => {
  append(e("line",{x1:s*SZ*0.55,y1:0,x2:s*2,y2:0,stroke:BLUE,"stroke-width":"1.5",opacity:"0.7"}));
  append(e("line",{x1:0,y1:s*SZ*0.55,x2:0,y2:s*2,stroke:BLUE,"stroke-width":"1.5",opacity:"0.7"}));
});
append(e("circle",{cx:"0",cy:"0",r:"4",fill:BLUE}));
// center label
append(e("text",{x:"0",y:"-8","text-anchor":"middle","dominant-baseline":"middle",
  "font-family":"'Courier New',monospace","font-size":"15",fill:BLUE},"(0,0)"));
append(e("text",{x:"0",y:"12","text-anchor":"middle","dominant-baseline":"middle",
  "font-family":"'Courier New',monospace","font-size":"12",fill:MID},"n=0"));

// ── radius annotation ─────────────────────────────────────────────────
// from center to ring-1 cell (q=1,r=0)
{
  const {x,y} = hxy(1,0);
  const mx = x*0.5 - 4, my = y*0.5 - 22;
  append(e("line",{x1:"3",y1:"-3",x2:x-6,y2:y+3,
    stroke:GOLD,"stroke-width":"1.5","stroke-dasharray":"none",
    "marker-end":"url(#aG)",opacity:"0.85"}));
  append(e("text",{x:mx,y:my,"text-anchor":"middle",
    "font-family":"'Courier New',monospace","font-size":"15",fill:GOLD},"R(1) = g"));
}

// ── axial axes ────────────────────────────────────────────────────────
function axis(x2, y2, label, lx, ly, id) {
  append(e("line",{x1:"0",y1:"0",x2,y2,
    stroke:MID,"stroke-width":"1.8","marker-end":`url(#${id})`}));
  append(e("text",{x:lx,y:ly,"text-anchor":"middle",
    "font-family":"'Courier New',monospace","font-size":"18",fill:CREAM,opacity:"0.6"},label));
}
axis(220, 0, "q", 238, 4, "aD");
const rax = Math.PI/3;
axis(Math.cos(rax)*210, -Math.sin(rax)*210, "r",
  Math.cos(rax)*228+6, -Math.sin(rax)*228-4, "aD");

// ── legend panel (right) ──────────────────────────────────────────────
const LX = 360, LY = -310;
const rows = [
  { col: BLUE,    label: "Stage 0  —  seed", formula: "R(0) = g⁰ = 1",  cells: "1 cell" },
  { col: BLUE,    label: "Stage 1  —  ring", formula: "R(1) = g",        cells: "6 cells" },
  { col: MID,     label: "Stage 2  —  ring", formula: "R(2) = g²",       cells: "12 cells" },
  { col: DIM,     label: "Stage 3  —  ring", formula: "R(3) = g³",       cells: "18 cells" },
];
rows.forEach(({col, label, formula, cells}, i) => {
  const y0 = LY + i*44 + 20;
  append(e("rect",{x:LX-2,y:y0-10,width:"12",height:"12",fill:col,opacity:"0.7",rx:"2"}));
  append(e("text",{x:LX+18,y:y0+2,"text-anchor":"start",
    "font-family":"'Courier New',monospace","font-size":"13",fill:col,opacity:"0.9"},label));
  append(e("text",{x:LX+18,y:y0+18,"text-anchor":"start",
    "font-family":"'Courier New',monospace","font-size":"12",fill:GOLD,opacity:"0.8"},formula));
  append(e("text",{x:LX+18,y:y0+32,"text-anchor":"start",
    "font-family":"'Courier New',monospace","font-size":"11",fill:DIM},cells));
});

// ── bottom spec strip ─────────────────────────────────────────────────
const specs = [
  ["Cell.center",   "hexToVec2 c.coord"],
  ["Cell.radius",   "R P c.stage = g^n"],
  ["Colony.expand", "∀ c ∈ C · neighbors(c) at n+1"],
  ["HexCoord",      "axial (q, r) ∈ ℤ²"],
];
specs.forEach(([k,v], i) => {
  const sx = -370 + i*200, sy = 280;
  append(e("text",{x:sx,y:sy,"text-anchor":"start",
    "font-family":"'Courier New',monospace","font-size":"12",fill:BLUE,opacity:"0.8"},k));
  append(e("text",{x:sx,y:sy+17,"text-anchor":"start",
    "font-family":"'Courier New',monospace","font-size":"11",fill:MID},v));
});

// ── border ────────────────────────────────────────────────────────────
// vertical separator between diagram and legend
append(e("line",{x1:"330",y1:"-330",x2:"330",y2:"330",
  stroke:"#1a3a60","stroke-width":"1","stroke-dasharray":"6 4"}));
append(e("rect",{x:"-400",y:"-340",width:"1100",height:"680",
  fill:"none",stroke:"#1a3a60","stroke-width":"2"}));
</script>
</body>
</html>
